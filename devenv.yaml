# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  storm-ops:
    url: github:storm-software/storm-ops
    flake: false
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  nixpkgs-unstable:
    url: github:nixos/nixpkgs/nixpkgs-unstable
  rust-overlay:
    url: github:oxalica/rust-overlay
    inputs:
      nixpkgs:
        follows: nixpkgs
  fenix:
    url: github:nix-community/fenix
    inputs:
      nixpkgs:
        follows: nixpkgs
  sccache:
    url: github:mozilla/sccache
    inputs:
      nixpkgs:
        follows: nixpkgs

imports:
  - storm-ops/devenv-modules/pnpm
  - storm-ops/devenv-modules/rust
  - storm-ops/devenv-modules/cpp
  - storm-ops/devenv-modules/python
  - storm-ops/devenv-modules/claude
  - storm-ops/devenv-modules/mdbook
