rules:
  template-injection:
    ignore:
      - release.yml
  dangerous-triggers:
    ignore:
      - greetings.yml:3:1
  unpinned-uses:
    ignore:
      - release.yml
      - zizmor.yml
      - sync-labels.yml
      - lock.yml
      - git-guardian.yml
      - contributors.yml
      - codeql.yml
      - dependabot-approval.yml
      - security.yml
      - security-reusable.yml
      - schedule-stale.yml
      - greetings.yml
  excessive-permissions:
    ignore:
      - release.yml
      - zizmor.yml
      - sync-labels.yml
      - lock.yml
      - git-guardian.yml
