# reference: https://github.com/rust-lang/cargo/issues/3946
#
# Nightly: keep [target.*] rustflags (e.g. Windows +crt-static) off host
# build scripts / proc-macros when cross-compiling.
# Root key = policy. [unstable] key = enable -Z feature (must be true for host-config).
# Must be declared before any [table] — TOML bare keys after a header stay in that table.
target-applies-to-host = false

[env]
CARGO_WORKSPACE_DIR = { value = "", relative = true }
WORKSPACE_DIR       = { value = "", relative = true }

[unstable]
host-config            = true
target-applies-to-host = true

# Host units (build scripts / proc-macros) when cross-compiling.
# Force dynamic CRT so Windows +crt-static cannot leak into Linux host bins
# (Nix: static glibc host bins → SIGSEGV in proc-macro2/quote/serde_core).
# linker=gcc: devenv may export CARGO_TARGET_<host>_LINKER=clang; prefer gcc.
[host]
linker = "gcc"
rustflags = ["-C", "target-feature=-crt-static"]

[build]
rustdocflags = [
    "--cfg",
    "docsrs",
    "--show-type-layout",
    "--generate-link-to-definition",
    "--enable-index-page"
]
target-dir = "dist/target"

[doc]
browser = "chromium"

[alias]
ck          = "check --workspace --all-features --all-targets --locked"
ls-lint     = "run --bin ls-lint"
run-fixture = "run --bin run-fixture"

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.i686-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.wasm32-wasip1-threads]
rustflags = ["-C", "target-feature=+simd128", "--cfg", "tokio_unstable"]

